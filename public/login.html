<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skate 3 | Login</title>

    <script src="./js/sessao.js"></script>
    <link rel="icon" href="./assets/imgs/skateicon.jpg">
    <link rel="stylesheet" href="./css/estilo.css">
</head>

<body>

    <div class="header">
        <div class="container">
            <h1 class="titulo">Skate 3</h1>
            <ul class="navbar">
                <li><a href="index.html">Início</a></li>
                <li><a href="manobras.html">Manobras</a></li>
                <li>|</li>
                <li class="agora"><a href="#">Login</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
            </ul>
        </div>
    </div>

    <div class="login">
        <div class="container">
            <div class="card card-login">

                <h2>Bem-vindo de volta</h2>

                <div class="formulario">
                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="seu@email.com">
                    </div>

                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>

                    <button type="button" class="botao" onclick="entrar()">Entrar</button>
                </div>

                <div id="div_aguardar" class="loading-div">
                    <img src="./assets/circle-loading.gif">
                </div>

                <div id="div_erros_login"></div>

            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p>Feito com amor por Danilo &hearts; SPTech &copy; 2026</p>
        </div>
    </div>

</body>

</html>
<script>
    var tentativas = [];

    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == '' || senhaVar == '') {
            var divErro = document.getElementById("div_erros_login");

            divErro.innerHTML = "Preencha todos os campos!";
            divErro.style.display = "block";
            finalizarAguardar();
            return false;
        } else {
            setInterval(sumirMensagem, 5000)
        }
        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id

                    setTimeout(function () {
                        window.location = "dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        var divErro = document.getElementById("div_erros_login");
        divErro.style.display = "none";
    }
</script>
